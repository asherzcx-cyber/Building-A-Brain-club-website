<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>Sign in Building A Brain Club</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="signin-page">
        <div class="custom-cursor"></div>
        <header>
            <img src="images/logos/Golden-BAB-logo-transparent.png" alt="Building A Brain Club logo" class="club-logo">
            <h1>Sign In</h1>
            <p>Access your Building A Brain account</p>
        </header>
        <main>
            <section class="join-card signin-card">
                <h2>Access</h2>
                <form id="signin-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="submit">Sign In</button>
                </form>
                <p class="signin-note">
                    Don't have an account yet?
                    <a href="join.html">Join the Club</a>
                </p>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
